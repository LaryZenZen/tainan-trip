<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>台南週末行程表</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#2b2420;
    --paper:#fbf6ee;
    --paper-2:#f3ead9;
    --brick:#c1442d;
    --brick-dark:#9c3521;
    --canal:#1f6f6b;
    --gold:#d4a237;
    --line:#e4d8c3;
    --danger:#e0342c;
    --danger-bg:#fdeceb;
    --slot-h:56px;
    --radius:14px;
    --shadow:0 2px 10px rgba(43,36,32,.10);
    --cat-交通:#3b6fa0;
    --cat-餐廳:#e8720c;
    --cat-休息:#7d7365;
    --cat-景點:#2f9e44;
    --cat-小吃:#e0b400;
    --cat-特產:#8e44ad;
    --cat-酒吧:#d6336c;
    --cat-夜市:#0f9b8e;
    --cat-丹丹漢堡:#a0522d;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:"Noto Sans TC",sans-serif;
    background:var(--paper);
    color:var(--ink);
    font-size:16px;
    line-height:1.5;
    overscroll-behavior:none;
  }
  h1,h2,h3,.serif{font-family:"Noto Serif TC",serif;}
  button{font-family:inherit;}
  #app{
    display:flex;
    flex-direction:column;
    height:100vh;
    height:100dvh;
    max-width:560px;
    margin:0 auto;
    background:var(--paper);
    position:relative;
    overflow:hidden;
    box-shadow:0 0 40px rgba(0,0,0,.08);
  }

  /* ---------- Header ---------- */
  header.top{
    padding:14px 16px 0 16px;
    background:linear-gradient(180deg,var(--brick) 0%, var(--brick-dark) 100%);
    color:#fff8ee;
    flex-shrink:0;
  }
  header.top .title-row{
    display:flex; align-items:baseline; justify-content:space-between; gap:8px;
  }
  header.top h1{
    margin:0 0 10px 0;
    font-size:20px;
    letter-spacing:.5px;
    font-weight:900;
  }
  header.top .subtitle{
    font-size:12px; opacity:.85; margin-bottom:10px;
  }
  .day-tabs{
    display:flex; gap:6px; padding-bottom:10px;
  }
  .day-tab{
    flex:1;
    min-height:44px;
    border:none;
    border-radius:10px 10px 0 0;
    background:rgba(255,255,255,.14);
    color:#fff8ee;
    font-size:15px;
    font-weight:700;
    display:flex; align-items:center; justify-content:center;
    gap:6px;
    cursor:pointer;
  }
  .day-tab.active{
    background:var(--paper);
    color:var(--brick-dark);
  }
  .day-tab .cnt{
    font-size:11px;
    background:rgba(0,0,0,.15);
    padding:1px 6px;
    border-radius:8px;
  }
  .day-tab.active .cnt{ background:var(--paper-2); color:var(--brick-dark); }

  /* ---------- overlap banner ---------- */
  .overlap-banner{
    display:none;
    align-items:center;
    gap:8px;
    background:var(--danger-bg);
    color:var(--danger);
    border-bottom:1px solid #f3c8c5;
    padding:9px 16px;
    font-size:13.5px;
    font-weight:700;
    flex-shrink:0;
  }
  .overlap-banner.show{display:flex;}

  /* ---------- Schedule ---------- */
  .schedule-wrap{
    flex:1;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    position:relative;
    background:var(--paper);
  }
  .schedule-grid{
    position:relative;
    padding-left:56px;
  }
  .slot-row{
    height:var(--slot-h);
    border-bottom:1px solid var(--line);
    position:relative;
  }
  .slot-row.hour{ border-bottom:1px solid #d8c8a8; }
  .slot-time-label{
    position:absolute;
    left:-56px;
    top:-8px;
    width:52px;
    text-align:right;
    font-size:11.5px;
    color:#8a7c68;
    font-weight:700;
    padding-right:6px;
  }
  .slot-row.dragover{ background:rgba(212,162,55,.18); }
  .items-layer{
    position:absolute;
    top:0; left:56px; right:8px;
    pointer-events:none;
  }
  .sched-card{
    position:absolute;
    left:0; right:0;
    border-radius:10px;
    border-left:6px solid var(--c);
    background:color-mix(in srgb, var(--c) 14%, white);
    padding:6px 9px;
    pointer-events:auto;
    overflow:hidden;
    cursor:pointer;
    box-shadow:var(--shadow);
    touch-action:pan-y;
    user-select:none; -webkit-user-select:none; -webkit-touch-callout:none;
  }
  .sched-card.overlap{
    outline:2px solid var(--danger);
    outline-offset:-2px;
    background:repeating-linear-gradient(135deg, var(--danger-bg), var(--danger-bg) 8px, color-mix(in srgb, var(--c) 14%, white) 8px, color-mix(in srgb, var(--c) 14%, white) 16px);
  }
  .sched-card .time{
    font-size:11.5px; font-weight:700; color:var(--ink); opacity:.75;
  }
  .sched-card .name{
    font-size:14.5px; font-weight:700; color:var(--ink);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .sched-card .meta{
    font-size:11px; color:#6b5f4f; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .sched-card .warn-icon{
    position:absolute; top:4px; right:6px; font-size:13px;
  }
  .sched-card.dragging{ opacity:.35; }

  /* ---------- Bottom nav ---------- */
  nav.bottom{
    flex-shrink:0;
    display:flex;
    border-top:1px solid var(--line);
    background:var(--paper);
    padding:6px 6px calc(6px + env(safe-area-inset-bottom)) 6px;
    gap:6px;
  }
  nav.bottom button{
    flex:1;
    min-height:52px;
    border:none;
    background:transparent;
    border-radius:12px;
    color:var(--ink);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:2px;
    font-size:11.5px;
    font-weight:700;
  }
  nav.bottom button .ic{ font-size:19px; }
  nav.bottom button:active{ background:var(--paper-2); }
  nav.bottom button.primary{ color:var(--brick); }

  /* ---------- Unscheduled panel (slide up) ---------- */
  .panel-scrim{
    position:absolute; inset:0; background:rgba(43,36,32,.35);
    display:none; z-index:20;
  }
  .panel-scrim.show{display:block;}
  .unscheduled-panel{
    position:absolute; left:0; right:0; bottom:0;
    background:var(--paper);
    border-radius:18px 18px 0 0;
    box-shadow:0 -6px 24px rgba(0,0,0,.18);
    transform:translateY(100%);
    transition:transform .22s ease;
    z-index:21;
    max-height:66%;
    display:flex; flex-direction:column;
  }
  .unscheduled-panel.show{ transform:translateY(0); }
  .panel-handle{
    width:40px; height:5px; background:var(--line); border-radius:3px;
    margin:10px auto 4px auto;
  }
  .panel-header{
    display:flex; align-items:center; justify-content:space-between;
    padding:4px 16px 8px 16px;
  }
  .panel-header h2{ font-size:16px; margin:0; }
  .panel-header .hint{ font-size:11.5px; color:#8a7c68; }
  .panel-body{
    overflow-y:auto;
    padding:4px 12px 16px 12px;
    display:flex; flex-direction:column; gap:8px;
  }
  .panel-body > *{ flex-shrink:0; } /* prevent cards being squashed when list is long */
  .unsched-card{
    display:flex; align-items:center; gap:8px;
    border-radius:12px;
    border-left:6px solid var(--c);
    background:color-mix(in srgb, var(--c) 10%, white);
    padding:10px 10px 10px 6px;
    min-height:56px;
    box-shadow:var(--shadow);
    overflow:hidden;
  }
  .unsched-card .info{ flex:1; min-width:0; }
  .unsched-card .name{
    font-size:15px; font-weight:700; line-height:1.35;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
  }
  .unsched-card .meta{
    font-size:12px; color:#6b5f4f;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .unsched-card .drag-handle{
    font-size:20px; color:#a3937a;
    width:40px; min-height:48px;
    display:flex; align-items:center; justify-content:center;
    touch-action:none; cursor:grab;
    flex-shrink:0;
  }
  .unsched-card .add-btn{
    border:none; background:var(--brick); color:#fff;
    border-radius:9px; min-height:36px; padding:0 12px;
    font-size:13px; font-weight:700;
  }
  .empty-note{
    text-align:center; color:#a3937a; font-size:13.5px; padding:20px 10px;
  }

  /* ---------- Modal / bottom sheet ---------- */
  .modal-scrim{
    position:absolute; inset:0; background:rgba(43,36,32,.45);
    display:none; z-index:30; align-items:flex-end;
  }
  .modal-scrim.show{display:flex;}
  .sheet{
    background:var(--paper);
    width:100%;
    max-height:92%;
    border-radius:18px 18px 0 0;
    display:flex; flex-direction:column;
    box-shadow:0 -8px 28px rgba(0,0,0,.2);
  }
  .sheet-header{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 16px 10px 16px;
    border-bottom:1px solid var(--line);
  }
  .sheet-header h2{ margin:0; font-size:17px; }
  .icon-btn{
    border:none; background:var(--paper-2); color:var(--ink);
    width:36px; height:36px; border-radius:50%;
    font-size:18px; display:flex; align-items:center; justify-content:center;
  }
  .sheet-body{
    overflow-y:auto; padding:14px 16px 10px 16px;
    display:flex; flex-direction:column; gap:14px;
  }
  .sheet-body > *{ flex-shrink:0; }
  .field label{
    display:block; font-size:12.5px; font-weight:700; color:#8a7c68; margin-bottom:5px;
  }
  .field input[type=text], .field textarea, .field select{
    width:100%; border:1.5px solid var(--line); border-radius:10px;
    padding:10px 11px; font-size:15px; font-family:inherit; background:#fff; color:var(--ink);
    min-height:44px;
  }
  .field textarea{ min-height:74px; resize:vertical; line-height:1.5; }
  .field .row2{ display:flex; gap:10px; }
  .field .row2 > div{ flex:1; }
  .cat-picker{ display:flex; flex-wrap:wrap; gap:8px; }
  .cat-chip{
    border:2px solid transparent; border-radius:20px; padding:8px 14px;
    font-size:13.5px; font-weight:700; min-height:38px;
    background:var(--paper-2); color:var(--ink); cursor:pointer;
  }
  .cat-chip.sel{ border-color:var(--c); background:color-mix(in srgb, var(--c) 18%, white); }
  .day-picker{ display:flex; gap:8px; }
  .day-picker button{
    flex:1; min-height:44px; border-radius:10px; border:2px solid var(--line);
    background:#fff; font-weight:700; color:var(--ink);
  }
  .day-picker button.sel{ border-color:var(--brick); background:color-mix(in srgb,var(--brick) 12%, white); color:var(--brick-dark); }
  .sheet-footer{
    display:flex; gap:10px; padding:12px 16px calc(12px + env(safe-area-inset-bottom)) 16px;
    border-top:1px solid var(--line);
  }
  .btn{
    flex:1; min-height:48px; border:none; border-radius:12px; font-size:15px; font-weight:700;
    display:flex; align-items:center; justify-content:center; gap:6px;
  }
  .btn.save{ background:var(--brick); color:#fff; }
  .btn.delete{ background:var(--danger-bg); color:var(--danger); flex:0 0 48px; }
  .btn.unschedule{ background:color-mix(in srgb, var(--canal) 14%, white); color:var(--canal); flex:0 0 74px; font-size:13px; }
  .confirm-scrim{
    position:absolute; inset:0; background:rgba(43,36,32,.5);
    display:flex; align-items:center; justify-content:center;
    z-index:80; padding:24px;
  }
  .confirm-box{
    background:var(--paper); border-radius:16px; width:100%; max-width:320px;
    padding:20px 18px 14px 18px; box-shadow:0 12px 40px rgba(0,0,0,.3);
  }
  .confirm-msg{
    font-size:15px; font-weight:700; line-height:1.6;
    white-space:pre-line; margin-bottom:16px;
  }
  .confirm-btns{ display:flex; gap:10px; }
  .cat-divider{
    display:flex; align-items:center; gap:8px;
    margin:10px 2px 2px 2px;
    font-size:13px; font-weight:900;
    color:var(--c);
  }
  .cat-divider::before{
    content:''; width:12px; height:12px; border-radius:4px;
    background:var(--c); flex-shrink:0;
  }
  .cat-divider::after{
    content:''; flex:1; height:2px; border-radius:1px;
    background:color-mix(in srgb, var(--c) 35%, transparent);
  }
  .btn.ghost{ background:var(--paper-2); color:var(--ink); }
  .overlap-flag{
    display:none;
    align-items:center; gap:6px;
    background:var(--danger-bg); color:var(--danger);
    border-radius:10px; padding:8px 10px; font-size:12.5px; font-weight:700;
  }
  .overlap-flag.show{display:flex;}

  /* drag ghost */
  .drag-ghost{
    position:fixed; z-index:999; pointer-events:none;
    border-radius:10px; border-left:6px solid var(--c);
    background:color-mix(in srgb, var(--c) 22%, white);
    padding:8px 12px; box-shadow:0 8px 24px rgba(0,0,0,.28);
    font-size:14px; font-weight:700; color:var(--ink);
    opacity:.95; max-width:240px;
  }
  .drag-toast{
    position:absolute; top:10px; left:50%; transform:translateX(-50%);
    background:var(--ink); color:#fff8ee; font-size:12.5px; font-weight:700;
    padding:7px 14px; border-radius:20px; z-index:40; display:none;
  }
  .drag-toast.show{ display:block; }

  .toast{
    position:absolute; bottom:78px; left:50%; transform:translateX(-50%);
    background:var(--ink); color:#fff8ee; font-size:13px; font-weight:700;
    padding:9px 16px; border-radius:22px; z-index:60;
    opacity:0; transition:opacity .25s; pointer-events:none;
  }
  .toast.show{ opacity:1; }

  input[type=file]{ display:none; }

  @media (min-width:560px){
    body{ background:#e9ddc8; }
    #app{ margin:16px auto; height:calc(100vh - 32px); height:calc(100dvh - 32px); border-radius:20px; overflow:hidden; }
  }
</style>
</head>
<body>
<div id="app">

  <header class="top">
    <div class="title-row">
      <h1 class="serif">🏮 台南週末行程表</h1>
    </div>
    <div class="subtitle">點行程卡片查看詳情．點「待排行程」加入時間表</div>
    <div class="day-tabs" id="dayTabs"></div>
  </header>

  <div class="overlap-banner" id="overlapBanner">⚠️ <span id="overlapText"></span></div>

  <div class="schedule-wrap" id="scheduleWrap">
    <div class="schedule-grid" id="scheduleGrid">
      <div class="items-layer" id="itemsLayer"></div>
    </div>
  </div>

  <nav class="bottom">
    <button class="primary" id="btnAdd"><span class="ic">➕</span>新增行程</button>
    <button id="btnUnsched"><span class="ic">🗂️</span>待排行程<span id="unschedBadge"></span></button>
    <button id="btnExport"><span class="ic">📤</span>匯出</button>
    <button id="btnImport"><span class="ic">📥</span>匯入</button>
    <button id="btnReset"><span class="ic">♻️</span>重置</button>
  </nav>

  <!-- unscheduled slide-up panel -->
  <div class="panel-scrim" id="panelScrim"></div>
  <div class="unscheduled-panel" id="unschedPanel">
    <div class="panel-handle"></div>
    <div class="panel-header">
      <h2 class="serif">待排行程清單</h2>
      <span class="hint">拖 ⠿ 排入，或點「加入」選時間</span>
    </div>
    <div class="panel-body" id="unschedList"></div>
  </div>

  <div class="drag-toast" id="dragToast">拖曳到時間表上放開即可加入</div>

  <!-- item modal / bottom sheet -->
  <div class="modal-scrim" id="modalScrim">
    <div class="sheet">
      <div class="sheet-header">
        <h2 class="serif" id="sheetTitle">行程詳情</h2>
        <button class="icon-btn" id="btnCloseSheet">✕</button>
      </div>
      <div class="sheet-body" id="sheetBody">
        <div class="field">
          <label>行程名稱</label>
          <input type="text" id="f_name" placeholder="例如：漁光島看夕陽">
        </div>
        <div class="field">
          <label>類別</label>
          <div class="cat-picker" id="f_cat"></div>
        </div>

        <div class="field" id="f_dayWrap">
          <label>安排到哪一天</label>
          <div class="day-picker" id="f_day">
            <button data-day="unsched">尚未安排</button>
            <button data-day="sat">星期六</button>
            <button data-day="sun">星期日</button>
          </div>
        </div>

        <div class="field" id="f_timeWrap">
          <label>開始時間 / 結束時間</label>
          <div class="row2">
            <div><input type="text" id="f_start" placeholder="09:00"></div>
            <div><input type="text" id="f_end" placeholder="12:00"></div>
          </div>
        </div>
        <div class="field" id="f_durWrap">
          <label>預估時長（分鐘，尚未安排時使用）</label>
          <input type="text" id="f_duration" placeholder="60">
        </div>

        <div class="overlap-flag" id="f_overlapFlag">⚠️ 此時段與其他行程重疊，可自行調整或保留</div>

        <div class="field">
          <label>地點</label>
          <input type="text" id="f_location" placeholder="例如：台南市安平區...">
        </div>
        <div class="field">
          <label>備註</label>
          <input type="text" id="f_note" placeholder="簡短備註，例如：四人用餐">
        </div>
        <div class="field">
          <label>詳細資訊（可多行）</label>
          <textarea id="f_detail" placeholder="例如：純酒吧、已訂位、地址、營業時間..."></textarea>
        </div>
      </div>
      <div class="sheet-footer">
        <button class="btn delete" id="btnDelete">🗑️</button>
        <button class="btn unschedule" id="btnUnschedule" style="display:none;">↩️ 移出</button>
        <button class="btn ghost" id="btnCancel">取消</button>
        <button class="btn save" id="btnSave">儲存</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
</div>

  const TAINAN_DISTRICTS = ["中西區","東區","南區","北區","安平區","安南區","永康區","歸仁區","新化區","左鎮區","玉井區","楠西區","南化區","仁德區","關廟區","龍崎區","官田區","麻豆區","佳里區","西港區","七股區","將軍區","學甲區","北門區","新營區","後壁區","白河區","東山區","六甲區","下營區","柳營區","鹽水區","善化區","大內區","山上區","新市區","安定區"];
  function extractDistrict(loc){
    if(!loc) return null;
    // require a 台南市/臺南市/南市 prefix so street names like「西市場南區」don't false-match
    const m = loc.match(/[台臺]?南市([\u4e00-\u9fa5]{1,3}區)/);
    if(m && TAINAN_DISTRICTS.includes(m[1])) return m[1];
    return null;
  }
  // Sort unscheduled list: group by category (fixed order), then within each
  // category cluster items that share the same district (區); items with no
  // detected district are pushed to the end of their category group.
  function sortedUnscheduled(list){
    const byCat = {};
    list.forEach(it=>{ (byCat[it.cat] = byCat[it.cat]||[]).push(it); });
    const result = [];
    CATS.forEach(cat=>{
      const items = byCat[cat];
      if(!items) return;
      const groups = {}; const order = []; const noDistrict = [];
      items.forEach(it=>{
        const d = extractDistrict(it.location);
        if(d){ if(!groups[d]){ groups[d]=[]; order.push(d); } groups[d].push(it); }
        else { noDistrict.push(it); }
      });
      order.forEach(d=> result.push(...groups[d]));
      result.push(...noDistrict);
    });
    return result;
  }

  /* ============ time helpers ============ */
  function fmt(min){
    let h = Math.floor(min/60), m = min%60;
    let moon = '';
    if(h>=24){ h-=24; moon=' 🌙'; }
    return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+moon;
  }
  function parseTimeStr(str, refIsAfterMidnightHint){
    // accepts "9:00", "09:00", "25:00" etc. Returns minutes-of-schedule (7:00-26:00 space) or null.
    if(!str) return null;
    const m = str.trim().match(/^(\d{1,2}):(\d{2})$/);
    if(!m) return null;
    let h = parseInt(m[1],10), mi = parseInt(m[2],10);
    if(mi<0||mi>59) return null;
    let total = h*60+mi;
    // if it's small hour (0-6) treat as after-midnight (next day) since our day runs 07:00-26:00
    if(h>=0 && h<7) total += 1440;
    if(total < DAY_START) total += 1440;
    return total;
  }
  function snap30(min){ return Math.round(min/30)*30; }
  function clamp(v,lo,hi){ return Math.max(lo,Math.min(hi,v)); }

  const scheduleGrid = document.getElementById('scheduleGrid');

  function buildGridRows(){
    // remove old rows (keep itemsLayer)
    Array.from(scheduleGrid.querySelectorAll('.slot-row')).forEach(r=>r.remove());
    let idx=0;
    for(let t=DAY_START; t<DAY_END; t+=SLOT_MIN){
      const row = document.createElement('div');
      row.className = 'slot-row' + (t%60===0?' hour':'');
      row.dataset.slotStart = t;
      if(t%60===0){
        const lab = document.createElement('div');
        lab.className='slot-time-label';
        lab.textContent = fmt(t);
        row.appendChild(lab);
      }
      scheduleGrid.insertBefore(row, itemsLayer);
      idx++;
    }
    const totalH = idx*SLOT_H;
    scheduleGrid.style.height = totalH+'px';
    itemsLayer.style.height = totalH+'px';
  }

  function computeOverlaps(items){
    const sorted = items.slice().sort((a,b)=>a.start-b.start);
    const overlapIds = new Set();
    for(let i=0;i<sorted.length;i++){
      for(let j=i+1;j<sorted.length;j++){
        if(sorted[j].start < sorted[i].end && sorted[j].end > sorted[i].start){
          overlapIds.add(sorted[i].id); overlapIds.add(sorted[j].id);
        }
      }
    }
    return overlapIds;
  }

  function renderDayTabs(){
    dayTabs.innerHTML = '';
    ['sat','sun'].forEach(d=>{
      const btn = document.createElement('button');
      btn.className = 'day-tab' + (state.activeDay===d?' active':'');
      const cnt = state.days[d].items.length;
      btn.innerHTML = `${state.days[d].label} <span class="cnt">${cnt}</span>`;
      btn.addEventListener('click', ()=>{ state.activeDay=d; renderAll(); saveState(); });
      dayTabs.appendChild(btn);
    });
  }

  function renderSchedule(){
    const items = state.days[state.activeDay].items;
    const overlapIds = computeOverlaps(items);
    if(overlapIds.size>0){
      overlapBanner.classList.add('show');
      overlapText.textContent = `此時段與其他行程重疊（共 ${overlapIds.size} 個行程），可點開調整時間`;
    } else {
      overlapBanner.classList.remove('show');
    }
    itemsLayer.innerHTML = '';
    items.forEach(it=>{
      const top = (clamp(it.start,DAY_START,DAY_END)-DAY_START)/30*SLOT_H;
      const h = Math.max((it.end-it.start)/30*SLOT_H, 30);
      const card = document.createElement('div');
      card.className = 'sched-card' + (overlapIds.has(it.id)?' overlap':'');
      card.style.top = top+'px';
      card.style.height = h+'px';
      card.style.setProperty('--c', `var(--cat-${it.cat})`);
      card.dataset.id = it.id;
      card.innerHTML = `
        ${overlapIds.has(it.id)?'<div class="warn-icon">⚠️</div>':''}
        <div class="time">${it.pinned?'📌 ':''}${fmt(it.start)}–${fmt(it.end)}</div>
        <div class="name">${escapeHtml(it.name)}</div>
        <div class="meta">${escapeHtml(it.location||it.note||'')}</div>
      `;
      attachCardOpen(card, it, 'sched');
      attachDrag(card, {type:'sched', id:it.id}, {longpress:true});
      itemsLayer.appendChild(card);
    });
  }

  function renderUnscheduled(){
    const list = document.getElementById('unschedList');
    const badge = document.getElementById('unschedBadge');
    badge.textContent = state.unscheduled.length ? ' '+state.unscheduled.length : '';
    list.innerHTML = '';
    if(state.unscheduled.length===0){
      list.innerHTML = '<div class="empty-note">目前沒有待排行程 🎉</div>';
      return;
    }
    const sorted = sortedUnscheduled(state.unscheduled);
    let lastCat = null;
    sorted.forEach(it=>{
      if(it.cat !== lastCat){
        lastCat = it.cat;
        const header = document.createElement('div');
        header.className = 'cat-divider';
        header.style.setProperty('--c', `var(--cat-${it.cat})`);
        header.textContent = it.cat;
        list.appendChild(header);
      }
      const card = document.createElement('div');
      card.className = 'unsched-card';
      card.style.setProperty('--c', `var(--cat-${it.cat})`);
      card.dataset.id = it.id;
      const district = extractDistrict(it.location);
      const metaBits = [];
      if(district) metaBits.push('📍'+district);
      metaBits.push(it.duration+'分鐘');
      if(!district && it.location) metaBits.push(escapeHtml(it.location));
      card.innerHTML = `
        <div class="drag-handle">⠿</div>
        <div class="info">
          <div class="name">${escapeHtml(it.name)}</div>
          <div class="meta">${metaBits.join(' ・ ')}</div>
        </div>
        <button class="add-btn">加入</button>
      `;
      card.querySelector('.add-btn').addEventListener('click', (e)=>{
        e.stopPropagation();
        openAddTimeFlow(it);
      });
      card.addEventListener('click', (e)=>{
        if(e.target.classList.contains('add-btn')) return;
        if(e.target.closest('.drag-handle')) return;
        if(dragCtx && dragCtx.moved) return;
        openModalFor(it,'unsched');
      });
      attachDrag(card.querySelector('.drag-handle'), {type:'unsched', id:it.id}, {visual:card});
      list.appendChild(card);
    });
  }

    return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function refreshTimeVisibility(){
    const day = selectedDay();
    if(day==='unsched'){
      f_timeWrap.style.display='none';
      f_durWrap.style.display='block';
    } else {
      f_timeWrap.style.display='block';
      f_durWrap.style.display='none';
    }
  }

  function checkOverlapPreview(){
    const day = selectedDay();
    if(day==='unsched'){ f_overlapFlag.classList.remove('show'); return; }
    const s = parseTimeStr(f_start.value);
    const e = parseTimeStr(f_end.value);
    if(s==null || e==null || e<=s){ f_overlapFlag.classList.remove('show'); return; }
    const items = state.days[day].items.filter(it => !(editCtx && editCtx.mode==='sched' && it.id===editCtx.id));
    const hasOverlap = items.some(it => s < it.end && e > it.start);
    f_overlapFlag.classList.toggle('show', hasOverlap);
  }

  function openModalFor(data, mode){
    editCtx = { mode, id: data.id };
    sheetTitle.textContent = mode==='sched' ? '行程詳情' : (mode==='unsched' ? '待排行程詳情' : '新增行程');
    f_name.value = data.name||'';
    setSelectedCat(data.cat||CATS[0]);
    if(mode==='sched'){
      setSelectedDay(state.activeDay);
      f_start.value = fmt(data.start).replace(' 🌙','');
      f_end.value = fmt(data.end).replace(' 🌙','');
      f_duration.value = '';
    } else {
      setSelectedDay('unsched');
      f_duration.value = data.duration||60;
      f_start.value=''; f_end.value='';
    }
    f_location.value = data.location||'';
    f_note.value = data.note||'';
    f_detail.value = data.detail||'';
    btnDelete.style.display = 'flex';
    btnUnschedule.style.display = (mode==='sched') ? 'flex' : 'none';
    refreshTimeVisibility();
    checkOverlapPreview();
    modalScrim.classList.add('show');
  }

  function openNewModal(){
    editCtx = { mode:'new', id: null };
    sheetTitle.textContent = '新增行程';
    f_name.value='';
    setSelectedCat(CATS[0]);
    setSelectedDay('unsched');
    f_start.value=''; f_end.value='';
    f_duration.value='60';
    f_location.value=''; f_note.value=''; f_detail.value='';
    btnDelete.style.display='none';
    btnUnschedule.style.display='none';
    refreshTimeVisibility();
    f_overlapFlag.classList.remove('show');
    modalScrim.classList.add('show');
  }

  function openAddTimeFlow(unschedItem){
    editCtx = { mode:'unsched', id: unschedItem.id };
    sheetTitle.textContent = '選擇時間並加入時間表';
    f_name.value = unschedItem.name;
    setSelectedCat(unschedItem.cat);
    setSelectedDay(state.activeDay);
    const s = DAY_START;
    f_start.value = fmt(s);
    f_end.value = fmt(s + (unschedItem.duration||60));
    f_duration.value = unschedItem.duration||60;
    f_location.value = unschedItem.location||'';
    f_note.value = unschedItem.note||'';
    f_detail.value = unschedItem.detail||'';
    btnDelete.style.display='flex';
    btnUnschedule.style.display='none';
    refreshTimeVisibility();
    checkOverlapPreview();
    modalScrim.classList.add('show');
  }

  function closeModal(){
    modalScrim.classList.remove('show');
    editCtx = null;
  }
  document.getElementById('btnCloseSheet').addEventListener('click', closeModal);
  document.getElementById('btnCancel').addEventListener('click', closeModal);
  modalScrim.addEventListener('click', (e)=>{ if(e.target===modalScrim) closeModal(); });

  document.getElementById('btnSave').addEventListener('click', ()=>{
    const name = f_name.value.trim() || '未命名行程';
    const cat = selectedCat();
    const location = f_location.value.trim();
    const note = f_note.value.trim();
    const detail = f_detail.value;
    const day = selectedDay();

    if(day==='unsched'){
      const duration = Math.max(15, parseInt(f_duration.value,10) || 60);
      if(editCtx.mode==='new'){
        state.unscheduled.push(mkUn(name,cat,duration,location,note,detail));
      } else if(editCtx.mode==='unsched'){
        const it = state.unscheduled.find(x=>x.id===editCtx.id);
        if(it){ Object.assign(it,{name,cat,duration,location,note,detail}); }
      } else if(editCtx.mode==='sched'){
        // moved from schedule back to unscheduled
        const dstate = state.days[state.activeDay];
        const idx = dstate.items.findIndex(x=>x.id===editCtx.id);
        if(idx>-1){
          const old = dstate.items[idx];
          dstate.items.splice(idx,1);
          state.unscheduled.push(mkUn(name,cat, old.end-old.start, location, note, detail));
        }
      }
    } else {
      let s = parseTimeStr(f_start.value);
      let e = parseTimeStr(f_end.value);
      if(s==null || e==null || e<=s){
        showToast('時間格式錯誤，請用 HH:MM 且結束需晚於開始');
        return;
      }
      s = snap30(s); e = snap30(e);
      s = clamp(s, DAY_START, DAY_END-30);
      e = clamp(e, s+30, DAY_END);

      if(editCtx.mode==='new'){
        state.days[day].items.push(mk(name,cat,s,e,location,note,detail));
      } else if(editCtx.mode==='sched'){
        // find item; may need to move across days if day changed vs activeDay
        let found=null, foundDay=null;
        ['sat','sun'].forEach(d=>{
          const idx = state.days[d].items.findIndex(x=>x.id===editCtx.id);
          if(idx>-1){ found = state.days[d].items[idx]; foundDay = d; }
        });
        if(found){
          if(foundDay!==day){
            state.days[foundDay].items = state.days[foundDay].items.filter(x=>x.id!==editCtx.id);
            state.days[day].items.push(Object.assign(found,{name,cat,start:s,end:e,location,note,detail}));
          } else {
            Object.assign(found,{name,cat,start:s,end:e,location,note,detail});
          }
        }
      } else if(editCtx.mode==='unsched'){
        const idx = state.unscheduled.findIndex(x=>x.id===editCtx.id);
        if(idx>-1) state.unscheduled.splice(idx,1);
        state.days[day].items.push(mk(name,cat,s,e,location,note,detail));
        state.activeDay = day;
      }
    }
    saveState();
    renderAll();
    closeModal();
    showToast('已儲存');
  });

  btnDelete.addEventListener('click', async ()=>{
    if(!editCtx || !editCtx.id) return;
    const ctx = { mode: editCtx.mode, id: editCtx.id };
    const ok = await appConfirm('確定要「永久刪除」這個行程嗎？\n（如果只是想移回待排清單，請按「↩️ 移出」）');
    if(!ok) return;
    if(ctx.mode==='sched'){
      ['sat','sun'].forEach(d=>{ state.days[d].items = state.days[d].items.filter(x=>x.id!==ctx.id); });
    } else if(ctx.mode==='unsched'){
      state.unscheduled = state.unscheduled.filter(x=>x.id!==ctx.id);
    }
    saveState();
    renderAll();
    closeModal();
    showToast('已刪除');
  });

  btnUnschedule.addEventListener('click', ()=>{
    if(!editCtx || editCtx.mode!=='sched' || !editCtx.id) return;
    let found=null;
    ['sat','sun'].forEach(d=>{
      const idx = state.days[d].items.findIndex(x=>x.id===editCtx.id);
      if(idx>-1){
        found = state.days[d].items[idx];
        state.days[d].items.splice(idx,1);
      }
    });
    if(found){
      state.unscheduled.push({
        id: found.id,
        name: found.name,
        cat: found.cat,
        duration: Math.max(30, found.end - found.start),
        location: found.location||'',
        note: found.note||'',
        detail: found.detail||''
      });
      saveState();
      renderAll();
      closeModal();
      showToast('已移回待排行程清單');
    }
  });

  function attachCardOpen(card, item, mode){
    card.addEventListener('click', (e)=>{
      if(dragCtx && dragCtx.moved) return;
      openModalFor(item, mode);
    });
  }

  /* ============ unscheduled slide panel ============ */
  const unschedPanel = document.getElementById('unschedPanel');
  const panelScrim = document.getElementById('panelScrim');
  function openPanel(){ unschedPanel.classList.add('show'); panelScrim.classList.add('show'); }
  function closePanel(){ unschedPanel.classList.remove('show'); panelScrim.classList.remove('show'); }
  document.getElementById('btnUnsched').addEventListener('click', ()=>{
    if(unschedPanel.classList.contains('show')) closePanel(); else openPanel();
  });
  panelScrim.addEventListener('click', closePanel);

  /* ============ top bar buttons ============ */
  document.getElementById('btnAdd').addEventListener('click', openNewModal);

  document.getElementById('btnExport').addEventListener('click', ()=>{
    const blob = new Blob([JSON.stringify(state,null,2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = '台南行程表.json';
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    showToast('已匯出 JSON');
  });

  const importInput = document.createElement('input');
  importInput.type='file'; importInput.accept='application/json';
  document.body.appendChild(importInput);
  document.getElementById('btnImport').addEventListener('click', ()=> importInput.click());
  importInput.addEventListener('change', (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = async ()=>{
      try{
        const data = JSON.parse(reader.result);
        if(!data.days || !data.unscheduled) throw new Error('格式不符');
        if(await appConfirm('匯入將覆蓋目前所有行程資料，確定嗎？')){
          state = data;
          if(!state.activeDay) state.activeDay='sat';
          saveState();
          renderAll();
          showToast('匯入成功');
        }
      }catch(err){
        showToast('匯入失敗：檔案格式錯誤');
      }
    };
    reader.readAsText(file);
    importInput.value='';
  });

  document.getElementById('btnReset').addEventListener('click', async ()=>{
    if(await appConfirm('確定要清空「時間表」上已排入的行程嗎？\n（📌 固定行程與待排行程清單不受影響）')){
      state.days.sat.items = state.days.sat.items.filter(x=>x.pinned);
      state.days.sun.items = state.days.sun.items.filter(x=>x.pinned);
      saveState();
      renderAll();
      showToast('時間表已重置（固定行程與待排清單保留）');
    }
  });

  /* ============ toast ============ */
  let toastTimer=null;
  function showToast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(()=>t.classList.remove('show'), 1800);
  }

  /* ============ custom confirm (native confirm() is blocked in sandboxed previews) ============ */
  function appConfirm(msg){
    return new Promise(resolve=>{
      const scrim = document.createElement('div');
      scrim.className = 'confirm-scrim';
      scrim.innerHTML = `
        <div class="confirm-box">
          <div class="confirm-msg"></div>
          <div class="confirm-btns">
            <button class="btn ghost">取消</button>
            <button class="btn save">確定</button>
          </div>
        </div>`;
      scrim.querySelector('.confirm-msg').textContent = msg;
      const btns = scrim.querySelectorAll('button');
      btns[0].addEventListener('click', ()=>{ scrim.remove(); resolve(false); });
      btns[1].addEventListener('click', ()=>{ scrim.remove(); resolve(true); });
      scrim.addEventListener('click', (e)=>{ if(e.target===scrim){ scrim.remove(); resolve(false); } });
      document.getElementById('app').appendChild(scrim);
    });
  }

  /* ============ drag (pointer events, unifies mouse + touch) ============ */
  const scheduleWrap = document.getElementById('scheduleWrap');
  const dragToast = document.getElementById('dragToast');
  let ghostEl = null;

  function blockTouchScroll(ev){ ev.preventDefault(); }

  function attachDrag(el, ref, opts){
    opts = opts || {};
    el.addEventListener('pointerdown', (e)=>{
      if(e.target.classList.contains('add-btn')) return;
      if(opts.longpress && e.pointerType !== 'mouse'){
        beginLongPress(e, el, ref, opts);
      } else {
        e.preventDefault();
        trackDrag(e, el, ref, opts, false);
      }
    });
  }

  // Touch on schedule cards: hold ~0.35s without moving to pick up the card;
  // swiping right away scrolls the timetable normally.
  function beginLongPress(e, el, ref, opts){
    const sx = e.clientX, sy = e.clientY;
    let done = false;
    const timer = setTimeout(()=>{
      if(done) return;
      done = true; cleanup();
      if(navigator.vibrate) try{ navigator.vibrate(25); }catch(_){}
      trackDrag(e, el, ref, opts, true);
    }, 350);
    function onMove(ev){
      if(Math.abs(ev.clientX-sx) > 10 || Math.abs(ev.clientY-sy) > 10){
        done = true; cleanup(); // treat as scroll
      }
    }
    function onEnd(){ done = true; cleanup(); }
    function cleanup(){
      clearTimeout(timer);
      window.removeEventListener('pointermove', onMove);
      window.removeEventListener('pointerup', onEnd);
      window.removeEventListener('pointercancel', onEnd);
    }
    window.addEventListener('pointermove', onMove);
    window.addEventListener('pointerup', onEnd);
    window.addEventListener('pointercancel', onEnd);
  }

  function trackDrag(e, el, ref, opts, startNow){
    const startX = e.clientX, startY = e.clientY;
    const visual = opts.visual || el;
    let started = false;
    let everMoved = false;
    dragCtx = { ref, moved:false };

    function findData(){
      if(ref.type==='unsched'){
        return state.unscheduled.find(x=>x.id===ref.id);
      } else {
        return state.days[state.activeDay].items.find(x=>x.id===ref.id);
      }
    }

    function begin(x, y){
      started = true;
      dragCtx.moved = true;
      closePanel();
      const data = findData();
      if(!data) return;
      window.addEventListener('touchmove', blockTouchScroll, {passive:false});
      ghostEl = document.createElement('div');
      ghostEl.className='drag-ghost';
      ghostEl.style.setProperty('--c', `var(--cat-${data.cat})`);
      const dur = ref.type==='unsched' ? data.duration : (data.end-data.start);
      ghostEl.textContent = `${data.name}（${dur}分鐘）`;
      ghostEl.style.left = (x+14)+'px';
      ghostEl.style.top = (y+14)+'px';
      document.body.appendChild(ghostEl);
      dragToast.classList.add('show');
      visual.classList.add('dragging');
    }

    function onMove(ev){
      if(!started){
        const dx = ev.clientX-startX, dy = ev.clientY-startY;
        if(Math.abs(dx)<8 && Math.abs(dy)<8) return;
        begin(ev.clientX, ev.clientY);
      }
      if(Math.abs(ev.clientX-startX)>6 || Math.abs(ev.clientY-startY)>6) everMoved = true;
      if(ghostEl){
        ghostEl.style.left = (ev.clientX+14)+'px';
        ghostEl.style.top = (ev.clientY+14)+'px';
      }
      highlightSlotAt(ev.clientX, ev.clientY);
    }

    function onUp(ev){
      window.removeEventListener('pointermove', onMove);
      window.removeEventListener('pointerup', onUp);
      window.removeEventListener('pointercancel', onUp);
      window.removeEventListener('touchmove', blockTouchScroll);
      clearSlotHighlight();
      dragToast.classList.remove('show');
      visual.classList.remove('dragging');
      if(ghostEl){ ghostEl.remove(); ghostEl=null; }

      if(started && everMoved && ev.type !== 'pointercancel'){
        const data = findData();
        if(data){
          const wrapRect = scheduleWrap.getBoundingClientRect();
          const withinX = ev.clientX >= wrapRect.left && ev.clientX <= wrapRect.right;
          const withinY = ev.clientY >= wrapRect.top && ev.clientY <= wrapRect.bottom;
          if(withinX && withinY){
            const offsetY = (ev.clientY - wrapRect.top) + scheduleWrap.scrollTop;
            let startMin = DAY_START + Math.round(offsetY/SLOT_H)*30;
            const dur = ref.type==='unsched' ? data.duration : (data.end-data.start);
            startMin = clamp(startMin, DAY_START, DAY_END-30);
            let endMin = clamp(startMin+dur, startMin+30, DAY_END);
            placeItemOnSchedule(ref, data, startMin, endMin);
          }
        }
      }
      setTimeout(()=>{ if(dragCtx) dragCtx.moved=false; }, 80);
    }

    if(startNow) begin(startX, startY);
    window.addEventListener('pointermove', onMove);
    window.addEventListener('pointerup', onUp);
    window.addEventListener('pointercancel', onUp);
  }

  function highlightSlotAt(x,y){
    clearSlotHighlight();
    const wrapRect = scheduleWrap.getBoundingClientRect();
    if(x<wrapRect.left||x>wrapRect.right||y<wrapRect.top||y>wrapRect.bottom) return;
    const offsetY = (y - wrapRect.top) + scheduleWrap.scrollTop;
    const idx = Math.floor(offsetY/SLOT_H);
    const rows = scheduleGrid.querySelectorAll('.slot-row');
    if(rows[idx]) rows[idx].classList.add('dragover');
  }
  function clearSlotHighlight(){
    scheduleGrid.querySelectorAll('.slot-row.dragover').forEach(r=>r.classList.remove('dragover'));
  }

  function placeItemOnSchedule(ref, data, startMin, endMin){
    if(ref.type==='unsched'){
      state.unscheduled = state.unscheduled.filter(x=>x.id!==ref.id);
      state.days[state.activeDay].items.push(mk(data.name, data.cat, startMin, endMin, data.location, data.note, data.detail));
      showToast(`已加入 ${state.days[state.activeDay].label}：${fmt(startMin)}–${fmt(endMin)}`);
    } else {
      const it = state.days[state.activeDay].items.find(x=>x.id===ref.id);
      if(it){ it.start=startMin; it.end=endMin; showToast('時間已更新'); }
    }
    saveState();
    renderAll();
  }

  /* ============ init ============ */
  async function init(){
    await loadState();
    if(!state.activeDay) state.activeDay='sat';
    buildGridRows();
    renderAll();
  }
  init();

})();
</script>
</body>
</html>
